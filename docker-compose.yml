version: '3.8'

services:
  backend:
    build: ./backend
    container_name: radar-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - JWT_SECRET=Kumteltechradar12@
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin1234
    volumes:
      - sqlite-data:/app/db
    networks:
      - radar-net

  frontend:
    build: ./frontend
    container_name: radar-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - radar-net

volumes:
  sqlite-data:

networks:
  radar-net:
    driver: bridge